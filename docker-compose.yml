version: '3.8'

services:
  eburon-tts:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/tmp/eburon_tts_outputs
    environment:
      - PORT=8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
